<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ders Paylaşım Platformu - Firebase Storage</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDVC44SWG6p9e0F2JNWc66zMJJTXO7TF98",
            authDomain: "konu-anlat.firebaseapp.com",
            projectId: "konu-anlat",
            storageBucket: "konu-anlat.firebasestorage.app",
            messagingSenderId: "283509599639",
            appId: "1:283509599639:web:05578aa68fea8243d8a8d2",
            measurementId: "G-E0SZZ0M7WD"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        
        // Make Firebase available globally
        window.db = db;
        window.storage = storage;
        window.firestore = { collection, addDoc, getDocs, deleteDoc, doc, onSnapshot, query, orderBy };
        window.firebaseStorage = { ref, uploadBytes, getDownloadURL, deleteObject };
    </script>
    
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 25px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 1.5rem 5%;
            box-shadow: var(--shadow-lg);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-name {
            font-weight: 600;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 20px;
        }

        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: white;
            color: var(--primary);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 5%;
        }

        /* Class Selector */
        .class-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .class-btn {
            padding: 1rem 2rem;
            background: white;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: var(--text-primary);
        }

        .class-btn:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        .class-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: transparent;
        }

        /* Subject Tabs */
        .subject-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            background: white;
            padding: 1rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .subject-tab {
            padding: 0.8rem 1.5rem;
            background: var(--bg-primary);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .subject-tab:hover {
            background: var(--primary);
            color: white;
        }

        .subject-tab.active {
            background: var(--primary);
            color: white;
        }

        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 2rem;
        }

        /* Upload Section */
        .upload-section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }

        .upload-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        .upload-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group textarea {
            padding: 0.8rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            background: var(--bg-primary);
            border: 2px dashed var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .file-input-label:hover {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
        }

        .btn-upload {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-upload:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Posts Grid */
        .posts-section {
            display: grid;
            gap: 1.5rem;
        }

        .post-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .post-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-3px);
        }

        .post-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .author-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }

        .author-info {
            display: flex;
            flex-direction: column;
        }

        .author-name {
            font-weight: 700;
            color: var(--text-primary);
        }

        .post-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .post-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }

        .post-image {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            background: var(--bg-primary);
            cursor: pointer;
        }

        .post-content {
            padding: 1.5rem;
        }

        .post-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .post-description {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Leaderboard */
        .leaderboard {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            position: sticky;
            top: 100px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .leaderboard-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            transition: all 0.3s ease;
        }

        .leaderboard-item:hover {
            background: var(--bg-primary);
        }

        .rank {
            font-weight: 700;
            font-size: 1.2rem;
            width: 30px;
            text-align: center;
        }

        .rank-1 { color: #fbbf24; }
        .rank-2 { color: #94a3b8; }
        .rank-3 { color: #cd7f32; }

        .leader-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }

        .leader-info {
            flex: 1;
        }

        .leader-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .leader-score {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .score-badge {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            padding: 2rem;
            position: relative;
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            color: var(--danger);
            transform: rotate(90deg);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .login-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .login-tab {
            flex: 1;
            padding: 0.8rem;
            background: var(--bg-primary);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-tab.active {
            background: var(--primary);
            color: white;
        }

        .image-modal-content {
            max-width: 90vw;
            max-height: 90vh;
            padding: 0;
            background: transparent;
        }

        .modal-image {
            width: 100%;
            height: auto;
            border-radius: 12px;
        }

        /* Admin Panel */
        .admin-badge {
            background: var(--warning);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        /* Moderator Panel */
        .mod-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border);
        }

        .mod-tab {
            padding: 1rem 2rem;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .mod-tab:hover {
            color: var(--primary);
        }

        .mod-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .mod-tab-content {
            display: none;
        }

        .mod-tab-content.active {
            display: block;
        }

        .mod-section {
            background: var(--bg-primary);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .mod-section h3 {
            color: var(--primary);
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }

        .filter-section {
            margin-bottom: 1rem;
        }

        .mod-post-item {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            border-left: 4px solid var(--primary);
        }

        .mod-post-thumbnail {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
        }

        .mod-post-info {
            flex: 1;
        }

        .mod-post-title {
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .mod-post-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .mod-post-actions {
            display: flex;
            gap: 0.5rem;
        }

        .user-item {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-item-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .content-grid {
                grid-template-columns: 1fr;
            }

            .leaderboard {
                position: relative;
                top: 0;
            }
        }

        @media (max-width: 640px) {
            .class-selector {
                flex-direction: column;
            }

            .class-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="logo">
                📚 Ders Paylaşım Platformu
            </div>
            <div class="user-info" id="userInfo" style="display: none;">
                <button class="btn btn-primary btn-sm" onclick="openModPanel()" style="margin-right: 1rem;">⚙️ Moderatör Paneli</button>
                <span class="user-name" id="currentUserName"></span>
                <button class="btn btn-danger btn-sm" onclick="logout()">Çıkış</button>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container" id="mainContent" style="display: none;">
        <!-- Class Selector -->
        <div class="class-selector">
            <button class="class-btn active" onclick="selectClass(9)">9. Sınıf</button>
            <button class="class-btn" onclick="selectClass(10)">10. Sınıf</button>
            <button class="class-btn" onclick="selectClass(11)">11. Sınıf</button>
            <button class="class-btn" onclick="selectClass(12)">12. Sınıf</button>
        </div>

        <!-- Subject Tabs -->
        <div class="subject-tabs" id="subjectTabs"></div>

        <!-- Content Grid -->
        <div class="content-grid">
            <!-- Main Content -->
            <div>
                <!-- Upload Section -->
                <div class="upload-section">
                    <h2 class="upload-title">📤 Yeni Konu Anlatımı Paylaş</h2>
                    <form class="upload-form" id="uploadForm">
                        <div class="form-group">
                            <label>Başlık</label>
                            <input type="text" id="postTitle" placeholder="Örn: Türev Formülleri" required>
                        </div>
                        <div class="form-group">
                            <label>Açıklama (Opsiyonel)</label>
                            <textarea id="postDescription" rows="3" placeholder="Konu hakkında kısa açıklama..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Konu Anlatımı Görseli</label>
                            <div class="file-input-wrapper">
                                <input type="file" id="postImage" accept="image/*" required>
                                <label for="postImage" class="file-input-label">
                                    📎 Görsel Seç
                                </label>
                            </div>
                            <span id="fileName" style="font-size: 0.85rem; color: var(--text-secondary);"></span>
                            <span style="font-size: 0.75rem; color: var(--success); margin-top: 0.25rem; display: block;">
                                ✨ Yeni: Görseller artık Firebase Storage'da saklanıyor!
                            </span>
                        </div>
                        <button type="submit" class="btn btn-upload">Paylaş</button>
                    </form>
                </div>

                <!-- Posts Section -->
                <div class="posts-section" id="postsSection"></div>
            </div>

            <!-- Leaderboard -->
            <div class="leaderboard">
                <h3 class="leaderboard-title">🏆 Skor Tablosu</h3>
                <div id="leaderboardContent"></div>
            </div>
        </div>
    </div>

    <!-- Login/Register Modal -->
    <div id="authModal" class="modal active">
        <div class="modal-content">
            <h2 class="modal-title">Hoş Geldiniz!</h2>
            <div class="login-tabs">
                <button class="login-tab active" onclick="switchAuthTab('login')">Giriş Yap</button>
                <button class="login-tab" onclick="switchAuthTab('register')">Kayıt Ol</button>
            </div>
            <form class="login-form" id="authForm">
                <div class="form-group">
                    <label>Kullanıcı Adı</label>
                    <input type="text" id="authUsername" placeholder="Kullanıcı adınız" required>
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="authPassword" placeholder="Şifreniz" required>
                </div>
                <button type="submit" class="btn btn-upload" id="authSubmitBtn">Giriş Yap</button>
            </form>
        </div>
    </div>

    <!-- Image Modal -->
    <div id="imageModal" class="modal">
        <div class="modal-content image-modal-content">
            <span class="modal-close" onclick="closeImageModal()">&times;</span>
            <img id="modalImage" class="modal-image" src="" alt="">
        </div>
    </div>

    <!-- Moderator Panel Modal -->
    <div id="modPanel" class="modal">
        <div class="modal-content" style="max-width: 1000px; max-height: 90vh; overflow-y: auto;">
            <span class="modal-close" onclick="closeModPanel()">&times;</span>
            <h2 class="modal-title">⚙️ Moderatör Paneli</h2>
            
            <div class="mod-tabs">
                <button class="mod-tab active" onclick="switchModTab('posts')">📝 Tüm Gönderiler</button>
                <button class="mod-tab" onclick="switchModTab('users')">👥 Kullanıcılar</button>
                <button class="mod-tab" onclick="switchModTab('stats')">📊 İstatistikler</button>
            </div>

            <!-- Posts Tab -->
            <div id="modPostsTab" class="mod-tab-content active">
                <div class="mod-section">
                    <h3>Tüm Gönderiler</h3>
                    <div class="filter-section">
                        <select id="filterClass" onchange="filterModPosts()" style="padding: 0.5rem; border-radius: 8px; border: 2px solid var(--border); margin-right: 1rem;">
                            <option value="">Tüm Sınıflar</option>
                            <option value="9">9. Sınıf</option>
                            <option value="10">10. Sınıf</option>
                            <option value="11">11. Sınıf</option>
                            <option value="12">12. Sınıf</option>
                        </select>
                        <select id="filterSubject" onchange="filterModPosts()" style="padding: 0.5rem; border-radius: 8px; border: 2px solid var(--border);">
                            <option value="">Tüm Dersler</option>
                            <option value="Matematik">Matematik</option>
                            <option value="Fizik">Fizik</option>
                            <option value="Kimya">Kimya</option>
                            <option value="Biyoloji">Biyoloji</option>
                            <option value="Tarih">Tarih</option>
                            <option value="Coğrafya">Coğrafya</option>
                            <option value="Edebiyat">Edebiyat</option>

    <script>
        // Data Storage with Firebase
        let currentUser = null;
        let currentClass = 9;
        let currentSubject = 'Matematik';
        let authMode = 'login';
        let postsListener = null;
        
        const subjects = {
            9: ['Matematik', 'Fizik', 'Kimya', 'Biyoloji', 'Tarih', 'Coğrafya', 'Edebiyat', 'İngilizce'],
            10: ['Matematik', 'Fizik', 'Kimya', 'Biyoloji', 'Tarih', 'Coğrafya', 'Edebiyat', 'İngilizce'],
            11: ['Matematik', 'Fizik', 'Kimya', 'Biyoloji', 'Tarih', 'Coğrafya', 'Edebiyat', 'İngilizce', 'Felsefe'],
            12: ['Matematik', 'Fizik', 'Kimya', 'Biyoloji', 'Tarih', 'Coğrafya', 'Edebiyat', 'İngilizce', 'Din Kültürü']
        };

        // LocalStorage keys (for backward compatibility - users only)
        const USERS_KEY = 'ders_users';

        // Initialize data
        async function initializeData() {
            if (!localStorage.getItem(USERS_KEY)) {
                // Create admin users by default
                const initialUsers = [
                    {
                        username: 'Egm1141',
                        password: 'about',
                        registeredAt: new Date().toISOString()
                    },
                    {
                        username: 'Omrr1311',
                        password: 'about',
                        registeredAt: new Date().toISOString()
                    }
                ];
                localStorage.setItem(USERS_KEY, JSON.stringify(initialUsers));
            }
        }

        // Get data
        function getUsers() {
            return JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
        }

        async function getPosts() {
            try {
                const postsCol = window.firestore.collection(window.db, 'posts');
                const q = window.firestore.query(postsCol, window.firestore.orderBy('createdAt', 'desc'));
                const snapshot = await window.firestore.getDocs(q);
                return snapshot.docs.map(doc => ({
                    firestoreId: doc.id,
                    ...doc.data()
                }));
            } catch (error) {
                console.error('Post'ları getirme hatası:', error);
                return [];
            }
        }

        // Save data
        function saveUsers(users) {
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
        }

        async function savePost(post) {
            try {
                const postsCol = window.firestore.collection(window.db, 'posts');
                const docRef = await window.firestore.addDoc(postsCol, post);
                console.log('Post kaydedildi, ID:', docRef.id);
                return docRef;
            } catch (error) {
                console.error('Post kaydetme hatası:', error);
                if (error.code === 'permission-denied') {
                    throw new Error('Yetki hatası! Firebase ayarlarını kontrol edin.');
                } else if (error.code === 'resource-exhausted') {
                    throw new Error('Görsel çok büyük! Lütfen daha küçük bir görsel kullanın.');
                } else {
                    throw new Error('Veritabanı hatası: ' + error.message);
                }
            }
        }

        // ✨ YENİ: Firebase Storage'dan görseli sil
        async function deleteImageFromStorage(imagePath) {
            try {
                if (!imagePath) return;
                
                const imageRef = window.firebaseStorage.ref(window.storage, imagePath);
                await window.firebaseStorage.deleteObject(imageRef);
                console.log('✅ Görsel Firebase Storage\'dan silindi:', imagePath);
            } catch (error) {
                console.error('❌ Görsel silme hatası:', error);
                // Hata olsa bile devam et, çünkü belki görsel zaten silinmiştir
            }
        }

        // ✨ GÜNCELLENMIŞ: Hem Firestore'dan hem Storage'dan sil
        async function deletePostFromFirestore(firestoreId) {
            try {
                // 1. Önce post verilerini al (imagePath için)
                const postsCol = window.firestore.collection(window.db, 'posts');
                const postDoc = window.firestore.doc(window.db, 'posts', firestoreId);
                const postSnapshot = await window.firestore.getDocs(window.firestore.query(postsCol));
                const post = postSnapshot.docs.find(doc => doc.id === firestoreId)?.data();
                
                // 2. Storage'dan görseli sil
                if (post && post.imagePath) {
                    await deleteImageFromStorage(post.imagePath);
                }
                
                // 3. Firestore'dan post'u sil
                await window.firestore.deleteDoc(postDoc);
                console.log('✅ Post Firestore\'dan silindi');
            } catch (error) {
                console.error('❌ Post silme hatası:', error);
                alert('❌ Gönderi silinirken hata oluştu!');
            }
        }

        // ✨ YENİ: Firebase Storage'a görsel yükle
        async function uploadImageToStorage(file, postId) {
            try {
                // Benzersiz dosya adı oluştur
                const fileName = `${postId}_${Date.now()}_${file.name}`;
                const imagePath = `posts/${currentUser.username}/${fileName}`;
                
                // Storage reference oluştur
                const storageRef = window.firebaseStorage.ref(window.storage, imagePath);
                
                // Dosyayı yükle
                await window.firebaseStorage.uploadBytes(storageRef, file);
                
                // Download URL al
                const downloadURL = await window.firebaseStorage.getDownloadURL(storageRef);
                
                console.log('✅ Görsel yüklendi:', downloadURL);
                return { downloadURL, imagePath };
            } catch (error) {
                console.error('❌ Görsel yükleme hatası:', error);
                throw new Error('Görsel yüklenirken hata oluştu: ' + error.message);
            }
        }

        // Image compression function
        function compressImage(file, maxWidth, quality, callback) {
            const reader = new FileReader();
            
            reader.onerror = function() {
                console.error('Dosya okuma hatası');
                callback(null);
            };
            
            reader.onload = function(event) {
                const img = new Image();
                
                img.onerror = function() {
                    console.error('Görsel yükleme hatası');
                    callback(null);
                };
                
                img.onload = function() {
                    try {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        // Yeni boyutları hesapla
                        if (width > maxWidth) {
                            height = (height * maxWidth) / width;
                            width = maxWidth;
                        }

                        canvas.width = width;
                        canvas.height = height;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // Blob olarak çıkar (Firebase Storage için)
                        canvas.toBlob(function(blob) {
                            callback(blob);
                        }, 'image/jpeg', quality);
                    } catch (error) {
                        console.error('Sıkıştırma hatası:', error);
                        callback(null);
                    }
                };

                img.src = event.target.result;
            };

            reader.readAsDataURL(file);
        }

        // Auth functions
        function switchAuthTab(mode) {
            authMode = mode;
            const tabs = document.querySelectorAll('.login-tab');
            tabs.forEach(tab => tab.classList.remove('active'));
            
            if (mode === 'login') {
                tabs[0].classList.add('active');
            } else {
                tabs[1].classList.add('active');
            }
            
            const submitBtn = document.getElementById('authSubmitBtn');
            submitBtn.textContent = mode === 'login' ? 'Giriş Yap' : 'Kayıt Ol';
        }

        // ✅ DÜZELTİLDİ: Auth form submit handler
        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value;

            if (!username || !password) {
                alert('❌ Lütfen tüm alanları doldurun!');
                return;
            }

            const users = getUsers();

            if (authMode === 'register') {
                // Kayıt işlemi
                if (users.find(u => u.username === username)) {
                    alert('❌ Bu kullanıcı adı zaten kullanılıyor!');
                    return;
                }

                users.push({
                    username: username,
                    password: password,
                    registeredAt: new Date().toISOString()
                });
                saveUsers(users);
                alert('✅ Kayıt başarılı! Şimdi giriş yapabilirsiniz.');
                
                // Formu temizle
                document.getElementById('authForm').reset();
                
                // Giriş moduna geç
                switchAuthTab('login');
                
            } else {
                // Giriş işlemi
                const user = users.find(u => u.username === username && u.password === password);
                if (user) {
                    currentUser = user;
                    document.getElementById('authModal').classList.remove('active');
                    document.getElementById('mainContent').style.display = 'block';
                    document.getElementById('userInfo').style.display = 'flex';
                    const isAdmin = username === 'Egm1141' || username === 'Omrr1311';
                    document.getElementById('currentUserName').textContent = username + (isAdmin ? ' 👑' : '');
                    
                    // Sayfa içeriğini yükle
                    loadSubjects();
                    loadPosts();
                    updateLeaderboard();
                } else {
                    alert('❌ Kullanıcı adı veya şifre hatalı!');
                }
            }
        });

        function logout() {
            if (postsListener) {
                postsListener();
            }
            currentUser = null;
            document.getElementById('authModal').classList.add('active');
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('authForm').reset();
            
            // Giriş moduna geri dön
            switchAuthTab('login');
        }

        // Class selection
        function selectClass(classNumber) {
            currentClass = classNumber;
            const buttons = document.querySelectorAll('.class-btn');
            buttons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(classNumber.toString())) {
                    btn.classList.add('active');

            loadSubjects();

        }

        // Load subjects
        function loadSubjects() {
            const container = document.getElementById('subjectTabs');
            container.innerHTML = '';
            
            subjects[currentClass].forEach((subject, index) => {
                const btn = document.createElement('button');
                btn.className = 'subject-tab' + (index === 0 ? ' active' : '');
                btn.textContent = subject;
                btn.onclick = () => selectSubject(subject);
                container.appendChild(btn);
            });
            
            currentSubject = subjects[currentClass][0];
        }

        function selectSubject(subject) {
            currentSubject = subject;
            const buttons = document.querySelectorAll('.subject-tab');
            buttons.forEach(btn => {
                btn.classList.toggle('active', btn.textContent === subject);
            });
            loadPosts();
        }

        // File upload handling
        document.getElementById('postImage').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || '';
            document.getElementById('fileName').textContent = fileName ? `Seçili: ${fileName}` : '';
        });

        // ✨ GÜNCELLENMIŞ: Firebase Storage ile yükleme
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const title = document.getElementById('postTitle').value.trim();
            const description = document.getElementById('postDescription').value.trim();
            const imageFile = document.getElementById('postImage').files[0];

            if (!title || !imageFile) {
                alert('Lütfen başlık ve görsel seçin!');
                return;
            }

            if (!imageFile.type.startsWith('image/')) {
                alert('❌ Lütfen geçerli bir görsel dosyası seçin!');
                return;
            }

            // Yükleme başladı
            const submitBtn = e.target.querySelector('.btn-upload');
            const originalBtnText = submitBtn.textContent;
            submitBtn.textContent = '⏳ Yükleniyor...';
            submitBtn.disabled = true;

            // Sıkıştır ve yükle
            compressImage(imageFile, 1200, 0.85, async function(compressedBlob) {
                if (!compressedBlob) {
                    alert('❌ Görsel işlenirken hata oluştu!');
                    submitBtn.textContent = originalBtnText;
                    submitBtn.disabled = false;
                    return;
                }

                // Dosya boyutunu kontrol et (5MB limit)
                const sizeInMB = compressedBlob.size / (1024 * 1024);
                if (sizeInMB > 5) {
                    alert('❌ Görsel çok büyük! Lütfen 5MB\'dan küçük bir görsel kullanın.');
                    submitBtn.textContent = originalBtnText;
                    submitBtn.disabled = false;
                    return;
                }

                try {
                    const postId = Date.now();
                    
                    // Firebase Storage'a yükle
                    submitBtn.textContent = '📤 Storage\'a yükleniyor...';
                    const { downloadURL, imagePath } = await uploadImageToStorage(compressedBlob, postId);
                    
                    // Firestore'a kaydet
                    submitBtn.textContent = '💾 Kaydediliyor...';
                    const newPost = {
                        id: postId,
                        title: title,
                        description: description,
                        imageUrl: downloadURL,  // Storage URL
                        imagePath: imagePath,   // Silmek için gerekli
                        author: currentUser.username,
                        class: currentClass,
                        subject: currentSubject,
                        createdAt: new Date().toISOString()
                    };

                    await savePost(newPost);
                    
                    // Formu temizle
                    document.getElementById('uploadForm').reset();
                    document.getElementById('fileName').textContent = '';
                    
                    alert('✅ Konu anlatımınız başarıyla paylaşıldı!');
                } catch (error) {
                    console.error('Yükleme hatası:', error);
                    alert('❌ Yükleme sırasında hata oluştu: ' + error.message);
                } finally {
                    submitBtn.textContent = originalBtnText;
                    submitBtn.disabled = false;
                }
            });
        });

        // Load posts
        async function loadPosts() {
            const container = document.getElementById('postsSection');
            
            if (postsListener) {
                postsListener();
            }
            
            const postsCol = window.firestore.collection(window.db, 'posts');
            const q = window.firestore.query(postsCol, window.firestore.orderBy('createdAt', 'desc'));
            
            postsListener = window.firestore.onSnapshot(q, (snapshot) => {
                let posts = snapshot.docs.map(doc => ({
                    firestoreId: doc.id,
                    ...doc.data()
                }));
                
                posts = posts.filter(p => p.class === currentClass && p.subject === currentSubject);

                if (posts.length === 0) {
                    container.innerHTML = `

                    return;
                }

                container.innerHTML = posts.map(post => {
                    // Eski base64 görselleri veya yeni Storage URL'lerini destekle
                    const imageUrl = post.imageUrl || post.image;
                    
                    return `

                                        ${post.author}

                                    </div>
                                    <div class="post-date">
                                        <span style="background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; margin-right: 0.5rem;">
                                            ${post.class}. Sınıf
                                        </span>
                                        <span style="background: var(--success); color: white; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; margin-right: 0.5rem;">
                                            ${post.subject}
                                        </span>
                                        ${formatDate(post.createdAt)}
                                    </div>
                                </div>
                            </div>
                            ${(currentUser.username === 'Egm1141' || currentUser.username === 'Omrr1311') ? `
                                <div class="post-actions">
                                    <button class="btn btn-danger btn-sm" onclick="deletePost('${post.firestoreId}')">🗑️ Sil</button>
                                </div>
                            ` : ''}
                        </div>
                        <img src="${imageUrl}" alt="${post.title}" class="post-image" onclick="openImageModal('${imageUrl}')">
                        <div class="post-content">
                            <h3 class="post-title">${post.title}</h3>
                            ${post.description ? `<p class="post-description">${post.description}</p>` : ''}
                        </div>
                    </div>
                `;
                }).join('');
                
                updateLeaderboard();
            });
        }

        // Delete post (admin only)
        async function deletePost(firestoreId) {
            if (currentUser.username !== 'Egm1141' && currentUser.username !== 'Omrr1311') {
                alert('Bu işlemi yapmaya yetkiniz yok!');
                return;
            }

            if (confirm('Bu gönderiyi silmek istediğinize emin misiniz? Görsel de Firebase Storage\'dan silinecek!')) {
                await deletePostFromFirestore(firestoreId);
                alert('✅ Gönderi ve görseli silindi!');
            }
        }

        // Update leaderboard
        async function updateLeaderboard() {
            const container = document.getElementById('leaderboardContent');
            const posts = await getPosts();
            
            const userCounts = {};
            posts.forEach(post => {
                userCounts[post.author] = (userCounts[post.author] || 0) + 1;
            });

            const leaderboard = Object.entries(userCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);

            if (leaderboard.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">Henüz paylaşım yok</p>';
                return;
            }

            container.innerHTML = leaderboard.map(([username, count], index) => `
                <div class="leaderboard-item">
                    <div class="rank rank-${index + 1}">#${index + 1}</div>
                    <div class="leader-avatar">${username[0].toUpperCase()}</div>
                    <div class="leader-info">
                        <div class="leader-name">
                            ${username}
                            ${(username === 'Egm1141' || username === 'Omrr1311') ? '<span class="admin-badge">ADMIN</span>' : ''}
                        </div>
                        <div class="leader-score">${count} paylaşım</div>
                    </div>
                    <div class="score-badge">${count}</div>
                </div>
            `).join('');
        }

                loadModPosts();

                                <div style="font-weight: 600;">

                                    ${(user.username === 'Egm1141' || user.username === 'Omrr1311') ? '<span class="admin-badge">ADMIN</span>' : ''}
                                </div>
                                <div style="font-size: 0.85rem; color: var(--text-secondary);">
                                    📅 Kayıt: ${new Date(user.registeredAt).toLocaleDateString('tr-TR')} | 
                                    📝 ${userPostCount} gönderi
                                </div>
                            </div>
                        </div>
                        ${(user.username !== 'Egm1141' && user.username !== 'Omrr1311' && (currentUser.username === 'Egm1141' || currentUser.username === 'Omrr1311')) ? `
                            <button class="btn btn-danger btn-sm" onclick="deleteUser('${user.username}')">🗑️ Kullanıcıyı Sil</button>
                        ` : ''}
                    </div>
                `;
            }).join('');

        async function deleteUser(username) {
            if (username === 'Egm1141' || username === 'Omrr1311') {
                alert('❌ Admin kullanıcısı silinemez!');
                return;
            }

            if (confirm(`"${username}" kullanıcısını ve tüm gönderilerini silmek istediğinize emin misiniz?`)) {
                let users = getUsers();
                users = users.filter(u => u.username !== username);
                saveUsers(users);

                const posts = await getPosts();
                const userPosts = posts.filter(p => p.author === username);
                for (const post of userPosts) {
                    await deletePostFromFirestore(post.firestoreId);
                }

                loadModUsers();
                alert('✅ Kullanıcı ve tüm gönderileri (görseller dahil) silindi!');
            }
        }

        async function loadModStats() {
            const container = document.getElementById('modStats');
            const users = getUsers();
            const posts = await getPosts();

            const postsByClass = {
                9: posts.filter(p => p.class === 9).length,
                10: posts.filter(p => p.class === 10).length,
                11: posts.filter(p => p.class === 11).length,
                12: posts.filter(p => p.class === 12).length
            };

            const subjectCounts = {};
            posts.forEach(post => {
                subjectCounts[post.subject] = (subjectCounts[post.subject] || 0) + 1;
            });

            const topSubject = Object.entries(subjectCounts).sort((a, b) => b[1] - a[1])[0];

            container.innerHTML = `
                <div class="stat-grid">
                    <div class="stat-card">
                        <div class="stat-number">${users.length}</div>
                        <div class="stat-label">Toplam Kullanıcı</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${posts.length}</div>
                        <div class="stat-label">Toplam Gönderi</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${topSubject ? topSubject[0] : '-'}</div>
                        <div class="stat-label">En Popüler Ders</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${(posts.length / users.length || 0).toFixed(1)}</div>
                        <div class="stat-label">Kullanıcı Başına Gönderi</div>
                    </div>
                </div>
                
                <div style="margin-top: 2rem;">
                    <h4 style="margin-bottom: 1rem; color: var(--primary);">Sınıflara Göre Gönderiler</h4>
                    <div class="stat-grid">
                        <div class="stat-card">
                            <div class="stat-number">${postsByClass[9]}</div>
                            <div class="stat-label">9. Sınıf</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${postsByClass[10]}</div>
                            <div class="stat-label">10. Sınıf</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${postsByClass[11]}</div>
                            <div class="stat-label">11. Sınıf</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${postsByClass[12]}</div>
                            <div class="stat-label">12. Sınıf</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Utility functions
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return 'Az önce';
            if (minutes < 60) return `${minutes} dakika önce`;
            if (hours < 24) return `${hours} saat önce`;
            if (days < 7) return `${days} gün önce`;
            
            return date.toLocaleDateString('tr-TR');
        }

        // Initialize
        initializeData();
    </script>
</body>
</html>
